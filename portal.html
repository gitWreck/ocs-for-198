<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>FOR 198 HI Portal - Temporarily Unavailable</title>

    <link rel="icon" type="image/png" href="CFNR-logo-final.png" />

    <style>
      :root {
        color-scheme: light;
        --green: #04543c;
        --green-dark: #033b2a;
        --maroon: #8b1539;
        --ink: #1f2937;
        --muted: #64748b;
        --line: #dbe4dc;
        --surface: #ffffff;
        --page: #f6f8f5;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
        background: linear-gradient(
            135deg,
            rgba(4, 84, 60, 0.08),
            transparent 42%
          ),
          linear-gradient(315deg, rgba(139, 21, 57, 0.08), transparent 40%),
          var(--page);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 680px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.1);
        overflow: hidden;
      }

      .banner {
        min-height: 12px;
        background: linear-gradient(90deg, var(--maroon), var(--green));
      }

      .content {
        padding: clamp(28px, 6vw, 52px);
        text-align: center;
      }

      .logo {
        width: 88px;
        height: 88px;
        object-fit: contain;
        margin-bottom: 24px;
      }

      .status {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 32px;
        padding: 6px 12px;
        border: 1px solid rgba(4, 84, 60, 0.2);
        border-radius: 999px;
        background: rgba(4, 84, 60, 0.08);
        color: var(--green-dark);
        font-size: 0.82rem;
        font-weight: 700;
        line-height: 1.2;
      }

      h1 {
        margin: 18px 0 12px;
        color: var(--green-dark);
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.08;
        letter-spacing: 0;
      }

      p {
        margin: 0 auto;
        max-width: 560px;
        color: var(--muted);
        font-size: clamp(1rem, 2.4vw, 1.125rem);
        line-height: 1.65;
      }

      .note {
        margin-top: 28px;
        padding-top: 22px;
        border-top: 1px solid var(--line);
        color: #475569;
        font-size: 0.95rem;
      }

      @media (max-width: 520px) {
        body {
          padding: 16px;
        }

        .logo {
          width: 72px;
          height: 72px;
        }
      }
    </style>
  </head>

  <body>
    <main aria-labelledby="maintenance-title">
      <div class="banner" aria-hidden="true"></div>
      <section class="content">
        <img class="logo" src="CFNR-logo-final.png" alt="CFNR logo" />
        <div class="status">Temporary Pause</div>
        <h1 id="maintenance-title">
          FOR 198 HI Portal is currently unavailable
        </h1>
        <p>
          <!-- Access to the portal has been temporarily paused while updates are
          being handled. Please check back later for availability. -->
        </p>
        <p class="note">
          <!-- For urgent internship concerns, please contact the FOR 198 coordinator
          or the CFNR office through the usual official channels. -->
        </p>
      </section>
    </main>
  </body>
</html>
